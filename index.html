<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Permit Driving Log</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #06172f, #0b2a4a, #123f6d);
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    .card {
      width: 100%;
      max-width: 480px;
      background: rgba(8, 20, 38, 0.94);
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 24px;
      padding: 26px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.4);
    }

    h1 {
      text-align: center;
      margin: 0 0 8px;
    }

    .subtitle {
      text-align: center;
      color: #b9d7ff;
      margin-bottom: 22px;
      font-size: 14px;
    }

    .progress-box {
      background: #0f2746;
      border-radius: 16px;
      padding: 14px;
      margin-bottom: 14px;
      border: 1px solid rgba(255, 255, 255, 0.12);
    }

    .progress-label {
      display: flex;
      justify-content: space-between;
      font-size: 14px;
      margin-bottom: 8px;
      color: #dcecff;
    }

    .progress-track {
      width: 100%;
      height: 10px;
      background: rgba(255, 255, 255, 0.16);
      border-radius: 999px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      width: 0%;
      background: linear-gradient(135deg, #2f80ed, #56ccf2);
      border-radius: 999px;
      transition: width 0.4s ease;
    }

    .stats {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin: 20px 0 24px;
    }

    .stat {
      background: #0f2746;
      border-radius: 16px;
      padding: 14px;
      text-align: center;
      border: 1px solid rgba(255, 255, 255, 0.12);
    }

    .stat .number {
      font-size: 24px;
      font-weight: bold;
      color: #56ccf2;
    }

    .stat .label {
      font-size: 12px;
      color: #b9d7ff;
      margin-top: 4px;
    }

    .section-title {
      margin: 6px 0 14px;
      font-size: 16px;
      color: #dcecff;
      font-weight: bold;
    }

    .recent-list {
      display: grid;
      gap: 10px;
      margin-bottom: 24px;
    }

    .recent-entry {
      background: #0f2746;
      border-radius: 14px;
      padding: 12px 14px;
      border: 1px solid rgba(255, 255, 255, 0.12);
      color: #dcecff;
      font-size: 14px;
    }

    .recent-entry strong {
      color: #56ccf2;
    }

    label {
      display: block;
      margin-bottom: 7px;
      font-weight: bold;
      font-size: 14px;
    }

    input,
    select {
      width: 100%;
      padding: 13px;
      margin-bottom: 18px;
      border-radius: 12px;
      border: 1px solid rgba(255, 255, 255, 0.2);
      background: #0f2746;
      color: white;
      font-size: 16px;
    }

    .time-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    button {
      width: 100%;
      padding: 15px;
      border: none;
      border-radius: 14px;
      background: linear-gradient(135deg, #2f80ed, #56ccf2);
      color: white;
      font-size: 17px;
      font-weight: bold;
      cursor: pointer;
    }

    button:hover {
      opacity: 0.9;
    }

    .message {
      margin-top: 16px;
      text-align: center;
      font-size: 14px;
      color: #b9d7ff;
      min-height: 20px;
    }
  </style>
</head>

<body>
  <div class="card">
    <h1>Permit Driving Log</h1>
    <div class="subtitle">Track driving hours for license requirements</div>

    <div class="progress-box">
      <div class="progress-label">
        <span>Total Progress</span>
        <span><span id="totalHoursText">--</span> / 50 hrs</span>
      </div>
      <div class="progress-track">
        <div class="progress-fill" id="totalProgress"></div>
      </div>
    </div>

    <div class="progress-box">
      <div class="progress-label">
        <span>Night Progress</span>
        <span><span id="nightHoursText">--</span> / 10 hrs</span>
      </div>
      <div class="progress-track">
        <div class="progress-fill" id="nightProgress"></div>
      </div>
    </div>

    <div class="stats">
      <div class="stat">
        <div class="number" id="remainingHours">--</div>
        <div class="label">Hours Left to 50</div>
      </div>
      <div class="stat">
        <div class="number" id="remainingNightHours">--</div>
        <div class="label">Night Left to 10</div>
      </div>
      <div class="stat">
        <div class="number" id="nightHours">--</div>
        <div class="label">Night Hours</div>
      </div>
      <div class="stat">
        <div class="number" id="dayHours">--</div>
        <div class="label">Day Hours</div>
      </div>
    </div>

    <div class="section-title">Recent Entries</div>
    <div id="recentEntries" class="recent-list">
      <div class="recent-entry">Loading recent entries...</div>
    </div>

    <div class="section-title">Add Driving Entry</div>

    <form id="drivingForm">
      <label for="date">Date</label>
      <input type="date" id="date" required />

      <label>Time Driven</label>
      <div class="time-row">
        <select id="hoursWhole" required>
          <option value="">Hours</option>
          <option value="0">0 hours</option>
          <option value="1">1 hour</option>
          <option value="2">2 hours</option>
          <option value="3">3 hours</option>
          <option value="4">4 hours</option>
          <option value="5">5 hours</option>
          <option value="6">6 hours</option>
        </select>

        <select id="minutes" required>
          <option value="">Minutes</option>
          <option value="0">0 min</option>
          <option value="10">10 min</option>
          <option value="20">20 min</option>
          <option value="30">30 min</option>
          <option value="40">40 min</option>
          <option value="50">50 min</option>
        </select>
      </div>

      <label for="dayNight">Day or Night</label>
      <select id="dayNight" required>
        <option value="">Select one</option>
        <option value="Day">Day</option>
        <option value="Night">Night</option>
      </select>

      <button type="submit">Save Driving Entry</button>
    </form>

    <div class="message" id="message"></div>
  </div>

  <script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxer6Ynn2aBUU_lFIk8eYZxYZaKllM_qWqYeEt-J6OpL_6NsQuyq3IlAWFDYDePE2ZvrQ/exec";

    const today = new Date();
    today.setMinutes(today.getMinutes() - today.getTimezoneOffset());
    document.getElementById("date").value = today.toISOString().split("T")[0];

    function updateTotals(data) {
      document.getElementById("totalHoursText").textContent = data.totalHours;
      document.getElementById("nightHoursText").textContent = data.nightHours;

      document.getElementById("remainingHours").textContent = data.remainingHours;
      document.getElementById("remainingNightHours").textContent = data.remainingNightHours;

      document.getElementById("dayHours").textContent = data.dayHours;
      document.getElementById("nightHours").textContent = data.nightHours;

      document.getElementById("totalProgress").style.width = data.totalPercent + "%";
      document.getElementById("nightProgress").style.width = data.nightPercent + "%";

      const recentList = document.getElementById("recentEntries");
      recentList.innerHTML = "";

      if (!data.recentEntries || data.recentEntries.length === 0) {
        recentList.innerHTML = '<div class="recent-entry">No entries yet.</div>';
        return;
      }

      data.recentEntries.forEach(entry => {
        const div = document.createElement("div");
        div.className = "recent-entry";
        div.innerHTML = `
          <strong>${entry.date}</strong><br>
          ${entry.hours} hours${entry.dayNight ? " - " + entry.dayNight : ""}
        `;
        recentList.appendChild(div);
      });
    }

    function loadTotals() {
      const callbackName = "totalsCallback_" + Date.now();

      window[callbackName] = function (data) {
        updateTotals(data);
        delete window[callbackName];
        script.remove();
      };

      const script = document.createElement("script");
      script.src = SCRIPT_URL + "?callback=" + callbackName;
      document.body.appendChild(script);
    }

    document.getElementById("drivingForm").addEventListener("submit", async function (e) {
      e.preventDefault();

      const message = document.getElementById("message");
      message.textContent = "Saving...";

      const wholeHours = Number(document.getElementById("hoursWhole").value);
      const minutes = Number(document.getElementById("minutes").value);
      const totalHours = wholeHours + (minutes / 60);

      const formData = new FormData();
      formData.append("date", document.getElementById("date").value);
      formData.append("hours", totalHours.toFixed(2));
      formData.append("dayNight", document.getElementById("dayNight").value);

      try {
        await fetch(SCRIPT_URL, {
          method: "POST",
          body: formData,
          mode: "no-cors"
        });

        message.textContent = "Entry saved successfully!";

        document.getElementById("hoursWhole").value = "";
        document.getElementById("minutes").value = "";
        document.getElementById("dayNight").value = "";
        document.getElementById("date").valueAsDate = new Date();

        setTimeout(loadTotals, 1000);

      } catch (error) {
        message.textContent = "Something went wrong. Please try again.";
      }
    });

    loadTotals();
  </script>
</body>

</html>
